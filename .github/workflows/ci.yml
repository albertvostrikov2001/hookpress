name: CI

on:
  push:
    branches: [main, master, develop]
  pull_request:

jobs:
  api:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services/api
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -r requirements.txt
      - run: ruff check .
      - run: pytest -q

  promo:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services/promo
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.23"
      - run: go test ./...

  flutter:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/mobile
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
      - run: flutter pub get
      - run: flutter analyze

  web:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: pnpm
      - run: pnpm install
      - run: pnpm --filter @hookpress/web typecheck
      - run: pnpm --filter @hookpress/web build

  e2e:
    runs-on: ubuntu-latest
    needs: [api]
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: hookpress
          POSTGRES_PASSWORD: hookpress_dev
          POSTGRES_DB: hookpress
        ports:
          - 5432:5432
      redis:
        image: redis:7.2-alpine
        ports:
          - 6379:6379
    env:
      DATABASE_URL: postgresql+asyncpg://hookpress:hookpress_dev@localhost:5432/hookpress
      REDIS_URL: redis://localhost:6379/0
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -r tests/e2e/requirements.txt
      - run: pip install -r services/api/requirements.txt
      - run: |
          cd services/api
          alembic upgrade head
          python scripts/seed.py
          uvicorn app.main:app --host 127.0.0.1 --port 8000 &
          sleep 5
          cd ../..
          pytest tests/e2e -m e2e -q
