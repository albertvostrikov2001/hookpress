apiVersion: apps/v1
kind: Deployment
metadata:
  name: hookpress-api
spec:
  replicas: 2
  selector:
    matchLabels:
      app: hookpress-api
  template:
    metadata:
      labels:
        app: hookpress-api
    spec:
      containers:
        - name: api
          image: hookpress/api:latest
          ports:
            - containerPort: 8000
          envFrom:
            - configMapRef:
                name: hookpress-api-config
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 15
          readinessProbe:
            httpGet:
              path: /ready
              port: 8000
            initialDelaySeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: hookpress-api
spec:
  selector:
    app: hookpress-api
  ports:
    - port: 8000
      targetPort: 8000
