# Render Blueprint — connect repo: https://dashboard.render.com/blueprints
# Docs: docs/DEPLOY_GITHUB.md

databases:
  - name: hookpress-db
    plan: free
    databaseName: hookpress
    user: hookpress

services:
  - type: web
    name: hookpress-api
    runtime: docker
    plan: free
    region: frankfurt
    dockerfilePath: ./services/api/Dockerfile
    dockerContext: .
    healthCheckPath: /health
    envVars:
      - key: APP_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: hookpress-db
          property: connectionString
      - key: DB_HOST
        fromDatabase:
          name: hookpress-db
          property: host
      - key: DB_PORT
        fromDatabase:
          name: hookpress-db
          property: port
      - key: DB_USER
        fromDatabase:
          name: hookpress-db
          property: user
      - key: DB_PASSWORD
        fromDatabase:
          name: hookpress-db
          property: password
      - key: DB_NAME
        fromDatabase:
          name: hookpress-db
          property: database
      - key: REDIS_URL
        sync: false
      - key: CORS_ORIGINS
        sync: false
      - key: CELERY_TASK_ALWAYS_EAGER
        value: "true"
      - key: S3_ENDPOINT
        sync: false
      - key: S3_ACCESS_KEY
        sync: false
      - key: S3_SECRET_KEY
        sync: false
      - key: S3_USE_SSL
        value: "true"
      - key: OTEL_EXPORTER_OTLP_ENDPOINT
        value: ""

  - type: web
    name: hookpress-web
    runtime: docker
    plan: free
    region: frankfurt
    dockerfilePath: ./apps/web/Dockerfile
    dockerContext: .
    envVars:
      - key: NEXT_PUBLIC_API_URL
        fromService:
          type: web
          name: hookpress-api
          envVarKey: RENDER_EXTERNAL_URL
      - key: INTERNAL_API_URL
        fromService:
          type: web
          name: hookpress-api
          envVarKey: RENDER_EXTERNAL_URL
